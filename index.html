<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEXUS CORE - アンケート集計ダッシュボード</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #00ffcc;
            --text: #f8fafc;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { border-left: 5px solid var(--accent); padding-left: 15px; color: var(--accent); }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #334155; color: var(--accent); font-size: 0.9rem; }
        tr:hover { background-color: #2d3748; }
        .q3-badge {
            background: #064e3b;
            color: #34d399;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 アンケート集計結果</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div>総回答数</div>
                <div id="total-responses" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div>平均満足度</div>
                <div id="avg-satisfaction" class="stat-value">0.0</div>
            </div>
        </div>

        <table id="result-table">
            <thead>
                <tr>
                    <th>日時</th>
                    <th>満足度</th>
                    <th>きっかけ (Q1)</th>
                    <th>メイン (Q2)</th>
                    <th>イベント案 (Q6)</th>
                    <th>要望 (Q7)</th>
                    <th>その他 (Q10)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // JSONファイルを読み込む
        fetch('enquete_results.json')
            .then(response => response.json())
            .then(data => {
                const responses = data.responses;
                document.getElementById('total-responses').innerText = responses.length;

                let totalScore = 0;
                const tbody = document.querySelector('#result-table tbody');

                responses.forEach(res => {
                    // 平均満足度の計算用
                    const score = parseInt(res.q3) || 0;
                    totalScore += score;

                    // 行の作成
                    const row = `
                        <tr>
                            <td style="font-size: 0.8rem; color: #94a3b8;">${res.timestamp.split('.')[0]}</td>
                            <td><span class="q3-badge">${res.q3}/10</span></td>
                            <td>${res.q1}</td>
                            <td>${res.q2}</td>
                            <td>${res.q6}</td>
                            <td>${res.q7}</td>
                            <td>${res.q10}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                const avg = (totalScore / responses.length).toFixed(1);
                document.getElementById('avg-satisfaction').innerText = isNaN(avg) ? "0.0" : avg;
            })
            .catch(err => console.error('データの読み込みに失敗しました:', err));
    </script>
</body>
</html>
