<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS CORE - Advanced Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #161b22;
            --accent: #58a6ff;
            --success: #3fb950;
            --text: #c9d1d9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; }
        
        /* 統計バッジ */
        .big-num { font-size: 3rem; font-weight: bold; color: var(--success); }
        
        /* テーブル装飾 */
        .scroll-table { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: var(--accent); position: sticky; top: 0; }
        tr:hover { background: #1f242c; }
        
        .timestamp { color: #8b949e; font-size: 0.8rem; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; background: #238636; color: white; }
    </style>
</head>
<body>

<div style="max-width: 1200px; margin: 0 auto;">
    <h1 style="color: white; display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.5em;">📊</span> NEXUS CORE アンケート集計
    </h1>

    <div class="grid">
        <div class="card" style="text-align: center;">
            <h2>総回答数</h2>
            <div id="count" class="big-num">0</div>
            <p>現在のユニーク回答者数</p>
        </div>
        <div class="card">
            <h2>満足度スコア分布</h2>
            <canvas id="satisfactionChart" height="150"></canvas>
        </div>
        <div class="card">
            <h2>きっかけ（Q1）内訳</h2>
            <canvas id="sourceChart" height="150"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>最新の回答一覧</h2>
        <div class="scroll-table">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>満足度</th>
                        <th>きっかけ</th>
                        <th>要望・意見 (Q7-Q10)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function loadData() {
    try {
        const res = await fetch('enquete_results.json');
        const data = await res.json();
        const responses = data.responses;

        // 1. 基本統計
        document.getElementById('count').innerText = responses.length;

        // 2. 満足度分布の集計
        const satLabels = Array.from({length: 10}, (_, i) => i + 1);
        const satData = new Array(10).fill(0);
        
        // 3. きっかけの集計
        const sourceMap = {};

        const tableBody = document.querySelector('#dataTable tbody');

        responses.forEach(item => {
            // 満足度カウント
            const s = parseInt(item.q3);
            if(s >= 1 && s <= 10) satData[s-1]++;

            // きっかけカウント
            const src = item.q1 || "不明";
            sourceMap[src] = (sourceMap[src] || 0) + 1;

            // テーブル追加
            const row = `<tr>
                <td class="timestamp">${item.timestamp.split(' ')[0]}</td>
                <td><span class="badge">${item.q3}/10</span></td>
                <td>${item.q1}</td>
                <td>
                    <div style="font-weight:bold; color: #58a6ff;">機能要望: ${item.q7 || 'なし'}</div>
                    <div style="font-size: 0.9rem; color: #8b949e;">その他: ${item.q10 || '-'}</div>
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });

        // --- グラフ描画 (Chart.js) ---
        
        // 満足度棒グラフ
        new Chart(document.getElementById('satisfactionChart'), {
            type: 'bar',
            data: {
                labels: satLabels,
                datasets: [{ label: '人数', data: satData, backgroundColor: '#58a6ff' }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#30363d' } } } }
        });

        // きっかけ円グラフ
        new Chart(document.getElementById('sourceChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(sourceMap),
                datasets: [{ data: Object.values(sourceMap), backgroundColor: ['#3fb950', '#f85149', '#d29922', '#8b949e'] }]
            }
        });

    } catch (e) {
        console.error("データ読み込みエラー:", e);
    }
}
loadData();
</script>

</body>
</html>
